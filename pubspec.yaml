name: trendai
description: AI-powered social media trend analyzer for Indian influencers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.0
  http: ^1.2.0

  # Icons
  cupertino_icons: ^1.0.6

  # Local storage
  shared_preferences: ^2.2.3

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  google_fonts: ^6.2.1

  # Subscription & RevenueCat
  purchases_flutter: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true